services:
  db:
    image: mysql:8.0
    container_name: mysql_db_laba8
    environment:
      # Главный пароль (он же будет использоваться для подключения)
      MYSQL_ROOT_PASSWORD: root
      # База данных, которая будет создана автоматически
      MYSQL_DATABASE: users
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: spring_app_laba8
    ports:
      - "8080:8080"
    environment:
      # Внутри сети Docker мы по-прежнему обращаемся к db:3306
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/users?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  db_data: